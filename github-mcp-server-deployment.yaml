apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${MCP_SERVER_NAME}
  labels:
    app: ${MCP_SERVER_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${MCP_SERVER_NAME}
  template:
    metadata:
      labels:
        app: ${MCP_SERVER_NAME}
    spec:
      containers:
      - name: ${MCP_SERVER_NAME}
        image: ghcr.io/github/github-mcp-server:latest
        args:
          - "http"
          - "--port"
          - "8082"
        env:
        - name: GITHUB_PERSONAL_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: ${MCP_SECRET_NAME}
              key: GITHUB_PERSONAL_ACCESS_TOKEN
        ports:
        - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: ${MCP_SERVICE_NAME}
spec:
  selector:
    app: ${MCP_SERVER_NAME}
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8082