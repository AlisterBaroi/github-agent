apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${AGENT_NAME}
  labels:
    app: ${AGENT_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${AGENT_NAME}
  template:
    metadata:
      labels:
        app: ${AGENT_NAME}
    spec:
      containers:
      - name: agent
        image: ${AGENT_IMAGE}
        imagePullPolicy: Never # Forces K8s to use local image that's loaded
        env:
        # Route directly to the internal Kubernetes service name
        - name: MCP_SERVER_URL
          value: "http://${MCP_SERVICE_NAME}:80/mcp"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ${AGENT_SERVICE_NAME}
spec:
  selector:
    app: ${AGENT_NAME}
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000